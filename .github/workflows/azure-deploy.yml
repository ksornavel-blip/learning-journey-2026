name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: patient-api-sornavel-2024
  ACR_NAME: patientapiregistry
  WORKING_DIRECTORY: ./PatientAPI

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      working-directory: ${{ env.WORKING_DIRECTORY }}
      run: dotnet restore
    
    - name: Build
      working-directory: ${{ env.WORKING_DIRECTORY }}
      run: dotnet build --configuration Release --no-restore
    
    - name: Run Unit and Integration Tests
      run: dotnet test PatientAPI.Tests/PatientAPI.Tests.csproj --configuration Release --verbosity normal
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Build and push to ACR
      run: |
        az acr build --registry ${{ env.ACR_NAME }} --image patient-api:${{ github.sha }} --image patient-api:latest ./PatientAPI
    
    - name: Deploy to App Service
      run: |
        az webapp config container set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group expensetracker-rg \
          --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/patient-api:latest
        
        az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group expensetracker-rg
```

**Key changes:**
- ✅ Added `working-directory: ./PatientAPI` to restore and build steps
- ✅ Test step specifies the full path: `PatientAPI.Tests/PatientAPI.Tests.csproj`
- ✅ `az acr build` now points to `./PatientAPI` folder

