name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: patient-api-sornavel-2024
  ACR_NAME: patientapiregistry
  IMAGE_NAME: patient-api

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    # Checkout code
    - name: Checkout code
      uses: actions/checkout@v4
    
    # Setup .NET
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    # Restore dependencies
    - name: Restore dependencies
      run: dotnet restore
    
    # Build
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    # Test (optional - add tests later)
    # - name: Test
    #   run: dotnet test --no-build --verbosity normal
    
    # Login to Azure
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    # Login to Azure Container Registry
    - name: Login to ACR
      run: |
        az acr login --name ${{ env.ACR_NAME }}
    
    # Build and push Docker image
    - name: Build and push Docker image
      run: |
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} .
        docker build -t ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest .
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }}
        docker push ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:latest
    
    # Deploy to Azure App Service
    - name: Deploy to Azure App Service
      run: |
        az webapp config container set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group expensetracker-rg \
          --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/${{ env.IMAGE_NAME }}:${{ github.sha }} \
          --docker-registry-server-url https://${{ env.ACR_NAME }}.azurecr.io
        
        az webapp restart \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group expensetracker-rg