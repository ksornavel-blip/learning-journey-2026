name: Build and Deploy to Azure

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

env:
  AZURE_WEBAPP_NAME: patient-api-sornavel-2024
  ACR_NAME: patientapiregistry

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
    
    - name: Setup .NET
      uses: actions/setup-dotnet@v4
      with:
        dotnet-version: '9.0.x'
    
    - name: Restore dependencies
      run: dotnet restore
    
    - name: Build
      run: dotnet build --configuration Release --no-restore
    
    # NEW: Run tests
    - name: Run Unit and Integration Tests
      run: dotnet test --no-build --verbosity normal --configuration Release
    
    - name: Login to Azure
      uses: azure/login@v2
      with:
        creds: ${{ secrets.AZURE_CREDENTIALS }}
    
    - name: Build and push to ACR
      run: |
        az acr build --registry ${{ env.ACR_NAME }} --image patient-api:${{ github.sha }} --image patient-api:latest .
    
    - name: Deploy to App Service
      run: |
        az webapp config container set \
          --name ${{ env.AZURE_WEBAPP_NAME }} \
          --resource-group expensetracker-rg \
          --docker-custom-image-name ${{ env.ACR_NAME }}.azurecr.io/patient-api:latest
        
        az webapp restart --name ${{ env.AZURE_WEBAPP_NAME }} --resource-group expensetracker-rg